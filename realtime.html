<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Dữ Liệu RealTime Siêu Thị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        textarea::-webkit-scrollbar, #previewImageContainer::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track, #previewImageContainer::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb, #previewImageContainer::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover, #previewImageContainer::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .highlight-green {
            background-color: #e6fffa;
            color: #2c7a7b;
            font-weight: 600;
        }
        .highlight-yellow {
            background-color: #fffbeb;
            color: #b45309;
            font-weight: 500;
        }
        .highlight-red {
            background-color: #fff5f5;
            color: #c53030;
            font-weight: 600;
        }
        .highlight-neutral {
            background-color: #f7fafc;
            color: #718096;
        }
        .summary-card {
            background-color: #f8fafc;
            border-radius: 0.75rem;
            padding: 0.75rem;
            text-align: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .summary-card .title {
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-gray-900">Bảng Theo Dõi RealTime Siêu Thị</h1>
            <p id="user-greeting" class="text-sm sm:text-md text-gray-600 mt-2">Dán dữ liệu báo cáo vào các ô bên dưới và nhấn nút để phân tích.</p>
            <p id="user-stores" class="text-xs text-gray-500 mt-1 italic"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 mb-8">
            <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-lg">
                <label for="dataInput1" class="block text-lg font-semibold text-gray-700 mb-2">Dữ liệu Ngành Hàng</label>
                <textarea id="dataInput1" rows="12" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" placeholder="Dán dữ liệu ngành hàng vào đây..."></textarea>
            </div>
            <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-lg">
                <label for="dataInput2" class="block text-lg font-semibold text-gray-700 mb-2">Dữ liệu Doanh Thu Tổng</label>
                <textarea id="dataInput2" rows="12" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" placeholder="Dán dữ liệu doanh thu tổng của siêu thị vào đây..."></textarea>
            </div>
        </div>

        <div class="text-center mb-8 flex flex-col sm:flex-row justify-center items-center gap-4">
            <a href="javascript:history.back()" class="w-full sm:w-auto bg-gray-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-gray-700 transition-transform transform hover:scale-105 shadow-md focus:outline-none focus:ring-4 focus:ring-gray-300 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Quay lại
            </a>
            <a href="index.html" class="w-full sm:w-auto bg-slate-200 text-slate-800 font-bold py-3 px-8 rounded-lg hover:bg-slate-300 hover:text-blue-700 transition-transform transform hover:scale-105 shadow-md focus:outline-none focus:ring-4 focus:ring-slate-300 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                </svg>
                Trang chủ
            </a>
            <button id="analyzeBtn" class="w-full sm:w-auto bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 transition-transform transform hover:scale-105 shadow-md focus:outline-none focus:ring-4 focus:ring-blue-300">
                Phân Tích & Lưu Dữ Liệu
            </button>
            <button id="screenshotBtn" class="w-full sm:w-auto bg-purple-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-purple-700 transition-transform transform hover:scale-105 shadow-md focus:outline-none focus:ring-4 focus:ring-purple-300 hidden">
                Chụp Ảnh
            </button>
             <button id="clearDataBtn" class="w-full sm:w-auto bg-red-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-red-700 transition-transform transform hover:scale-105 shadow-md focus:outline-none focus:ring-4 focus:ring-red-300 hidden">
                Xóa Dữ Liệu Đã Lưu
            </button>
        </div>

        <div id="resultsContainer" class="hidden">
            <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-lg mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
                <label for="supermarketSelect" class="text-lg font-semibold text-gray-700">Chọn Siêu Thị:</label>
                <select id="supermarketSelect" class="w-full md:w-1/2 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></select>
            </div>
            
            <div id="captureArea">
                <h2 id="supermarketTitle" class="text-xl md:text-2xl font-bold text-center p-3 rounded-t-lg text-white"></h2>
                <p id="updateTimestamp" class="text-center text-sm text-gray-500 pt-2 pb-4 bg-white"></p>

                <!-- Summary Cards -->
                <div id="summaryCards" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 p-4 bg-white">
                    <!-- Cards will be generated by JS -->
                </div>

                <div class="overflow-x-auto bg-white rounded-b-2xl shadow-lg">
                    <table id="resultTable" class="min-w-full">
                        <thead class="bg-green-700 text-white">
                            <tr class="divide-x divide-green-500">
                                <th scope="col" class="px-4 py-3 text-left text-sm font-bold uppercase tracking-wider">Ngành Hàng</th>
                                <th scope="col" class="px-4 py-3 text-right text-sm font-bold uppercase tracking-wider">Realtime</th>
                                <th scope="col" class="px-4 py-3 text-right text-sm font-bold uppercase tracking-wider">Target Ngày</th>
                                <th scope="col" class="px-4 py-3 text-right text-sm font-bold uppercase tracking-wider">% HT Target Ngày</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody" class="bg-white divide-y divide-gray-200">
                            <!-- Dữ liệu sẽ được chèn vào đây bởi JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Screenshot Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-5 rounded-lg shadow-xl max-w-4xl w-full relative">
            <h3 class="text-xl font-bold mb-4 text-center">Xem Trước Ảnh Chụp</h3>
            <div id="previewImageContainer" class="mb-4 border-2 border-dashed border-gray-300 rounded-lg overflow-auto max-h-[75vh] bg-gray-100 p-2">
                <img id="previewImage" src="" alt="Screenshot preview" class="mx-auto">
            </div>
            <div class="text-center space-x-4">
                 <button id="saveImageBtn" class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 transition-transform transform hover:scale-105 shadow-md">Lưu Ảnh</button>
                 <button id="closePreviewBtn" class="bg-red-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-red-700 transition-transform transform hover:scale-105 shadow-md">Đóng</button>
            </div>
        </div>
    </div>


    <script>
        // --- DOM Elements ---
        const analyzeBtn = document.getElementById('analyzeBtn');
        const screenshotBtn = document.getElementById('screenshotBtn');
        const clearDataBtn = document.getElementById('clearDataBtn');
        const supermarketSelect = document.getElementById('supermarketSelect');
        const resultsContainer = document.getElementById('resultsContainer');
        const previewModal = document.getElementById('previewModal');
        const previewImage = document.getElementById('previewImage');
        const closePreviewBtn = document.getElementById('closePreviewBtn');
        const saveImageBtn = document.getElementById('saveImageBtn');
        const updateTimestampEl = document.getElementById('updateTimestamp');
        const dataInput1 = document.getElementById('dataInput1');
        const dataInput2 = document.getElementById('dataInput2');
        const userGreeting = document.getElementById('user-greeting');
        const userStoresEl = document.getElementById('user-stores');

        let parsedData = {};
        let summaryData = {};
        let allCategories = [];

        // --- CÁC HÀM QUẢN LÝ DỮ LIỆU THEO USER ---

        /**
         * Lấy user ID từ tham số 'user' trong URL.
         * @returns {string|null} User ID hoặc null nếu không có.
         */
        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('user');
        }

        /**
         * Lưu dữ liệu vào localStorage cho một user ID cụ thể.
         * @param {string} userId - ID của người dùng.
         * @param {string} data1 - Dữ liệu từ ô ngành hàng.
         * @param {string} data2 - Dữ liệu từ ô doanh thu tổng.
         * @param {string[]} stores - Mảng chứa tên các siêu thị.
         */
        function saveData(userId, data1, data2, stores) {
            if (!userId) return;
            const data = {
                data1: data1,
                data2: data2,
                stores: stores, // Thêm danh sách siêu thị vào dữ liệu lưu trữ
                timestamp: new Date().toISOString()
            };
            localStorage.setItem(`realtimeData_${userId}`, JSON.stringify(data));
            console.log(`Dữ liệu và danh sách siêu thị đã được lưu cho User ID: ${userId}`, stores);
        }

        /**
         * Tải dữ liệu từ localStorage cho một user ID cụ thể.
         * @param {string} userId - ID của người dùng.
         * @returns {object|null} Đối tượng dữ liệu hoặc null nếu không có.
         */
        function loadData(userId) {
            if (!userId) return null;
            const savedData = localStorage.getItem(`realtimeData_${userId}`);
            if (savedData) {
                console.log(`Đã tìm thấy dữ liệu đã lưu cho User ID: ${userId}`);
                return JSON.parse(savedData);
            }
            return null;
        }
        
        /**
         * Xóa dữ liệu đã lưu của user hiện tại.
         * @param {string} userId - ID của người dùng.
         */
        function clearSavedData(userId) {
            if (!userId) return;
            localStorage.removeItem(`realtimeData_${userId}`);
            alert(`Đã xóa dữ liệu đã lưu của User ID: ${userId}`);
            // Tải lại trang để xóa sạch giao diện
            window.location.reload();
        }


        // --- CÁC HÀM PHÂN TÍCH DỮ LIỆU ---

        function parseCategoryData(text) {
            const lines = text.trim().split('\n');
            const data = {};
            const allSupermarkets = new Set();
            let currentCategory = null;
            // Bổ sung tiền tố ĐML_ vào danh sách nhận diện siêu thị hợp lệ
            const storePrefixes = ['ĐMM_', 'ĐMS_', 'TGD_', 'ĐML_'];

            for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;
                const parts = trimmedLine.split(/\s{2,}|\t/);
                const isStoreLine = storePrefixes.some(prefix => parts[0].startsWith(prefix));
                const isTotalLine = parts[0].startsWith('Tổng');
                
                if (!isStoreLine && !isTotalLine) {
                    currentCategory = parts[0];
                    if (!data[currentCategory]) data[currentCategory] = { stores: {} };
                } else if (isStoreLine && currentCategory) {
                    const storeName = parts[0];
                    allSupermarkets.add(storeName);
                    data[currentCategory].stores[storeName] = {
                        realtime: parts[1] || 'N/A',
                        target: parts[2] || 'N/A',
                        percentage: parts[3] || 'N/A',
                    };
                }
            }
            return { data, allSupermarkets: Array.from(allSupermarkets).sort() };
        }

        function parseSummaryData(text) {
            const lines = text.trim().split('\n').slice(1); // Bỏ qua dòng tiêu đề
            const data = {};
            // Bổ sung tiền tố ĐML_ vào danh sách nhận diện siêu thị hợp lệ ở dữ liệu doanh thu tổng
            const storePrefixes = ['ĐMM_', 'ĐMS_', 'TGD_', 'ĐML_'];

            for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;
                const parts = trimmedLine.split(/\s{2,}|\t/);
                const storeName = parts[0];

                if (storePrefixes.some(prefix => storeName.startsWith(prefix))) {
                     data[storeName] = {
                        percentage: parts[1] || '0%',
                        realtime: parseFloat(parts[2]) || 0,
                        target: parseFloat(parts[3]) || 0,
                    };
                }
            }
            return data;
        }

        // --- CÁC HÀM HIỂN THỊ ---

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            let color = '#';
            for (let i = 0; i < 3; i++) {
                let value = (hash >> (i * 8)) & 0xFF;
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        }

        function displaySummaryCards(selectedSupermarket) {
            const cardsContainer = document.getElementById('summaryCards');
            cardsContainer.innerHTML = '';
            const data = summaryData[selectedSupermarket];

            if (!data) return;

            const target = data.target;
            const realtime = data.realtime;
            const remaining = target - realtime;
            
            const startTime = 8, endTime = 22, totalWorkHours = endTime - startTime;
            const now = new Date();
            const elapsedHours = Math.max(0, Math.min(now.getHours() + now.getMinutes() / 60, endTime) - startTime);
            const workdayProgress = elapsedHours > 0 ? elapsedHours / totalWorkHours : 0;
            const projectedPercentage = (workdayProgress > 0 && target > 0) ? (realtime / workdayProgress / target * 100) : 0;
            
            const cards = [
                { title: 'Target DT', value: target, icon: '🎯' },
                { title: 'Lũy kế DT', value: realtime, icon: '📈' },
                { title: 'DT Còn lại', value: remaining > 0 ? remaining.toFixed(2) : `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`, icon: '💰' },
                { title: 'Dự kiến HT', value: `${projectedPercentage.toFixed(0)}%`, icon: '⏳' },
            ];

            cards.forEach(card => {
                cardsContainer.innerHTML += `
                    <div class="summary-card bg-slate-700">
                        <div class="title">${card.icon} ${card.title}</div>
                        <div class="value">${card.value}</div>
                    </div>
                `;
            });
        }

        function displayResults() {
            const selectedSupermarket = supermarketSelect.value;
            const resultBody = document.getElementById('resultBody');
            const supermarketTitle = document.getElementById('supermarketTitle');
            
            resultBody.innerHTML = ''; 
            if (!selectedSupermarket) return;

            supermarketTitle.textContent = `Realtime Siêu Thị: ${selectedSupermarket}`;
            supermarketTitle.style.backgroundColor = stringToColor(selectedSupermarket);

            const now = new Date();
            const formattedTime = now.toLocaleString('vi-VN', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            updateTimestampEl.textContent = `Cập nhật lúc: ${formattedTime}`;

            displaySummaryCards(selectedSupermarket);

            const participatingCategories = [];
            for (const category of allCategories) {
                const storeData = parsedData[category]?.stores[selectedSupermarket];
                if (storeData && parseFloat(storeData.realtime) !== 0) {
                    participatingCategories.push({ name: category, ...storeData });
                }
            }

            participatingCategories.sort((a, b) => {
                const percentA = parseFloat(String(a.percentage).replace(/,/g, '').replace('%', '')) || -Infinity;
                const percentB = parseFloat(String(b.percentage).replace(/,/g, '').replace('%', '')) || -Infinity;
                const targetA = parseFloat(a.target) || 0;
                const targetB = parseFloat(b.target) || 0;
                if (percentB !== percentA) return percentB - percentA;
                return targetB - targetA;
            });

            participatingCategories.forEach(item => {
                const row = document.createElement('tr');
                const percentValue = parseFloat(String(item.percentage).replace(/,/g, '').replace('%', ''));
                let rowClass = 'highlight-neutral';
                
                if (!isNaN(percentValue)) {
                    if (percentValue >= 100) rowClass = 'highlight-green';
                    else if (percentValue >= 70) rowClass = 'highlight-yellow';
                    else rowClass = 'highlight-red';
                }
                
                row.className = `divide-x divide-gray-200`;
                row.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-base font-medium ${rowClass}">${item.name}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-base text-right tabular-nums ${rowClass}">${item.realtime}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-base text-right tabular-nums ${rowClass}">${item.target}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-base text-right tabular-nums font-semibold ${rowClass}">${item.percentage}</td>
                `;
                resultBody.appendChild(row);
            });
        }

        // --- SỰ KIỆN VÀ KHỞI TẠO ---

        analyzeBtn.addEventListener('click', () => {
            const userId = getUserId();
            const rawData1 = dataInput1.value;
            const rawData2 = dataInput2.value;
            if (!rawData1.trim() || !rawData2.trim()) {
                alert('Vui lòng nhập dữ liệu vào cả hai ô để phân tích.');
                return;
            }
            
            const analysisResult = parseCategoryData(rawData1);
            parsedData = analysisResult.data;
            allCategories = Object.keys(parsedData);
            const allSupermarkets = analysisResult.allSupermarkets;

            // Lưu dữ liệu và danh sách siêu thị trước khi phân tích
            saveData(userId, rawData1, rawData2, allSupermarkets);

            summaryData = parseSummaryData(rawData2);

            supermarketSelect.innerHTML = '';
            if (allSupermarkets.length === 0) {
                 const option = document.createElement('option');
                 option.textContent = "Không tìm thấy siêu thị nào";
                 supermarketSelect.appendChild(option);
            } else {
                allSupermarkets.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    supermarketSelect.appendChild(option);
                });
            }

            resultsContainer.classList.remove('hidden');
            screenshotBtn.classList.remove('hidden');
            clearDataBtn.classList.remove('hidden');
            displayResults();
        });

        supermarketSelect.addEventListener('change', displayResults);

        screenshotBtn.addEventListener('click', () => {
            const captureElement = document.getElementById('captureArea');
            if (!captureElement) return;

            screenshotBtn.innerHTML = 'Đang chụp...';
            screenshotBtn.disabled = true;

            // Cuộn lên đầu trang để đảm bảo html2canvas có một điểm bắt đầu nhất quán
            window.scrollTo(0, 0);

            // Thêm một khoảng trễ nhỏ để trình duyệt có thời gian render lại sau khi cuộn
            setTimeout(() => {
                html2canvas(captureElement, {
                    useCORS: true,
                    scale: 2,
                }).then(canvas => {
                    previewImage.src = canvas.toDataURL('image/png');
                    previewModal.classList.remove('hidden');
                }).catch(error => {
                    console.error('Lỗi khi chụp ảnh:', error);
                    alert('Đã xảy ra lỗi khi cố gắng chụp ảnh. Vui lòng thử lại.');
                }).finally(() => {
                    screenshotBtn.innerHTML = 'Chụp Ảnh';
                    screenshotBtn.disabled = false;
                });
            }, 100); // 100ms delay
        });
        
        clearDataBtn.addEventListener('click', () => {
            const userId = getUserId();
            if (confirm(`Bạn có chắc chắn muốn xóa dữ liệu đã lưu của User ${userId} không?`)) {
                clearSavedData(userId);
            }
        });

        closePreviewBtn.addEventListener('click', () => {
            previewModal.classList.add('hidden');
        });

        saveImageBtn.addEventListener('click', async () => {
            const selectedSupermarket = supermarketSelect.value.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const today = new Date().toISOString().slice(0, 10);
            const fileName = `Bao_cao_${selectedSupermarket}_${today}.png`;

            if ('showSaveFilePicker' in window) {
                try {
                    const response = await fetch(previewImage.src);
                    const blob = await response.blob();
                    const handle = await window.showSaveFilePicker({
                        suggestedName: fileName,
                        types: [{ description: 'PNG Images', accept: { 'image/png': ['.png'] } }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('Không thể lưu file:', err);
                        const link = document.createElement('a');
                        link.download = fileName;
                        link.href = previewImage.src;
                        link.click();
                    }
                }
            } else {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = previewImage.src;
                link.click();
            }
        });

        // Hàm khởi tạo khi trang được tải
        window.addEventListener('DOMContentLoaded', () => {
            // Luôn bắt đầu với ô nhập liệu trống
            dataInput1.value = '';
            dataInput2.value = '';

            const userId = getUserId();
            if (userId) {
                userGreeting.textContent = `Xin chào User ${userId}. Dữ liệu của bạn sẽ được tự động lưu.`;
                const data = loadData(userId);
                
                // Chỉ điền dữ liệu nếu tìm thấy
                if (data) {
                    dataInput1.value = data.data1;
                    dataInput2.value = data.data2;
                    if (data.stores && data.stores.length > 0) {
                        userStoresEl.textContent = 'Các siêu thị đang quản lý: ' + data.stores.join('; ');
                        console.log('Các siêu thị được tải cho user:', data.stores);
                    }
                    clearDataBtn.classList.remove('hidden');
                    // Tự động phân tích dữ liệu đã tải
                    analyzeBtn.click();
                } else {
                    userGreeting.textContent += ' Chưa có dữ liệu nào được lưu cho bạn.';
                }
            } else {
                userGreeting.textContent = 'Không có User ID trên URL. Dữ liệu sẽ không được lưu tự động.';
            }
        });

    </script>
