<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Doanh Thu Theo Nhân Viên</title>
    <!-- Nhúng Tailwind CSS -->
    <!-- Ghim 3.4.16: bản không ghim sẽ tự nhảy lên Tailwind v4 (đổi cú pháp, hỏng giao diện) -->
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <!-- Nhúng thư viện SheetJS để đọc Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Nhúng thư viện html2canvas để chụp ảnh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #captureArea {
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-6 relative">

        <!-- Khu vực Upload File -->
        <div id="uploadSection" class="bg-white rounded-xl shadow-sm p-8 mb-6 text-center border-2 border-dashed border-blue-300 hover:border-blue-500 transition-colors">
            <h1 class="text-2xl font-bold text-blue-700 mb-4 uppercase">Hệ Thống Báo Cáo Doanh Thu Realtime</h1>
            <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv" class="hidden" />
            <label for="fileUpload" class="cursor-pointer inline-flex flex-col items-center justify-center p-4">
                <svg class="w-16 h-16 text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                <span class="text-lg font-medium text-gray-700 bg-blue-50 px-6 py-2 rounded-full hover:bg-blue-100 transition">Nhấn để tải lên file Excel / CSV</span>
            </label>
            <div id="fileNameDisplay" class="mt-4 text-sm font-semibold text-green-600 hidden"></div>
        </div>

        <div id="loading" class="loader mb-6"></div>

        <!-- Khu vực Điều khiển (Ẩn cho đến khi có dữ liệu) -->
        <div id="controlsSection" class="hidden bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex flex-col mb-4 gap-4">
                <h3 class="font-bold text-gray-800 text-lg">Chọn Nhân Viên Cần Báo Cáo:</h3>
                <div class="flex gap-2">
                    <button onclick="selectAllEmployees(true)" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200 font-medium text-sm transition-colors">Chọn tất cả</button>
                    <button onclick="selectAllEmployees(false)" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 font-medium text-sm transition-colors">Bỏ chọn tất cả</button>
                </div>
            </div>
            
            <!-- Danh sách checkbox nhân viên -->
            <div id="employeeCheckboxes" class="custom-scrollbar grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3 max-h-48 overflow-y-auto p-2 border border-gray-200 rounded-lg bg-gray-50">
                <!-- Checkbox sẽ được đổ bằng JS -->
            </div>
        </div>

        <!-- Các Nút Điều Hướng VÀ Xem Trước -->
        <div id="actionButtons" class="hidden flex flex-col lg:flex-row justify-between items-center gap-4 mb-6">
            <!-- Nút Quay Lại -->
            <a href="index.html" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-white text-gray-700 border-2 border-gray-300 rounded-lg hover:bg-gray-50 hover:text-blue-600 hover:border-blue-300 transition shadow-sm font-bold text-sm w-full lg:w-auto shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Quay lại trang chủ
            </a>
            
            <div class="flex flex-wrap justify-end gap-3 w-full lg:w-auto">
                <!-- Nút Xem DT Quy Đổi (Bảng tổng hợp theo ngành hàng) -->
                <button onclick="generateQuyDoiSTPreview()" class="inline-flex items-center justify-center gap-2 px-5 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold text-sm shadow-lg transition-transform hover:-translate-y-0.5 w-full sm:w-auto shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Quy đổi theo ST
                </button>

                <!-- Nút Xem DT Quy Đổi (Bảng tổng hợp theo nhân viên) -->
                <button onclick="generateQuyDoiPreview()" class="inline-flex items-center justify-center gap-2 px-5 py-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-bold text-sm shadow-lg transition-transform hover:-translate-y-0.5 w-full sm:w-auto shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Bảng Kê DT Quy Đổi
                </button>

                <!-- Nút Xem Trước Ảnh (Các thẻ chi tiết) -->
                <button onclick="generatePreview()" class="inline-flex items-center justify-center gap-2 px-5 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold text-sm shadow-lg transition-transform hover:-translate-y-0.5 w-full sm:w-auto shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Báo Cáo Thẻ Chi Tiết
                </button>
            </div>
        </div>

        <!-- Khu vực Báo cáo (Khu vực sẽ được chụp ảnh) -->
        <div id="reportSection" class="hidden">
            <!-- Bao bọc để render ảnh đẹp (Giao diện lưới hoặc bảng tổng) -->
            <div id="captureArea" class="p-6 rounded-xl relative">
                <!-- Dữ liệu báo cáo sẽ được đổ động vào đây qua JS -->
            </div>
        </div>
    </div>

    <!-- Modal Xem Trước Ảnh -->
    <div id="previewModal" class="hidden fixed inset-0 z-50 bg-black/80 flex flex-col items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl flex flex-col max-h-[95vh] w-full max-w-[95vw]">
            <div class="flex justify-between items-center p-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-800">Xem trước ảnh xuất</h3>
                <button onclick="closePreviewModal()" class="text-gray-500 hover:text-red-500 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-auto bg-gray-100 p-4 flex justify-center items-start custom-scrollbar">
                <img id="previewImage" src="" alt="Báo cáo" class="max-w-full shadow-lg border border-gray-300" />
            </div>
            
            <div class="p-4 border-t border-gray-200 flex justify-end gap-3 bg-white rounded-b-lg">
                <button onclick="closePreviewModal()" class="px-5 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium">Đóng</button>
                <button id="downloadBtn" class="px-5 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 font-bold shadow transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Tải Ảnh Xuống
                </button>
            </div>
        </div>
    </div>

    <!-- Hộp thoại Thông báo Custom -->
    <div id="messageBox" class="hidden fixed inset-0 z-[60] bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full text-center">
            <div class="text-orange-500 mb-4">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">Thông báo</h3>
            <p id="messageBoxContent" class="text-gray-600 mb-6"></p>
            <button onclick="closeMessageBox()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium w-full transition-colors">Đóng</button>
        </div>
    </div>

    <script>
        const validExportTypes = [
            'Xuất bán hàng tại siêu thị', 'Xuất bán ưu đãi cho nhân viên',
            'Xuất bán hàng trả góp tại siêu thị', 'Xuất bán hàng tại siêu thị (TCĐM)',
            'Xuất bán trả góp ưu đãi cho nhân viên', 'Xuất bán pre-order tại siêu thị'
        ];

        const installmentTypes = [
            'Xuất bán hàng trả góp tại siêu thị', 'Xuất bán trả góp ưu đãi cho nhân viên'
        ];

        // Hệ số quy đổi: phần lớn tra theo Ngành hàng (cột AN), riêng 3 dòng
        // "loa vi tính" / "mắt kính" / "loa karaoke" là tên Nhóm hàng (cột AO).
        // Giữ nguyên thứ tự ưu tiên gốc - rule nào khớp trước thì thắng.
        function getMultiplier(categoryName, subCategoryName) {
            const cat = (categoryName || '').toString().toLowerCase();
            const sub = (subCategoryName || '').toString().toLowerCase();

            if (cat.includes('664 - sim online')) return 5.45;
            if (cat.includes('1994 - dịch vụ bảo hành')) return 4.18;
            if (cat.includes('16 - phụ kiện tiện ích')) return 3.37;
            if (cat.includes('184 - phụ kiện trang trí')) return 3.37;
            if (sub.includes('loa vi tính')) return 3.37;
            if (cat.includes('164 - vas')) return 3.30;
            if (sub.includes('mắt kính')) return 3.07;
            if (cat.includes('1274 - đồng hồ thời trang')) return 3.00;
            if (cat.includes('364 - it')) return 2.00;
            if (cat.includes('23 - wearable')) return 3.00;
            if (cat.includes('1034 - dụng cụ nhà bếp')) return 1.92;
            if (cat.includes('1116 - máy lọc nước')) return 1.85;
            if (cat.includes('484 - điện gia dụng')) return 1.85;
            if (cat.includes('1214 - gia dụng lắp đặt')) return 1.85;
            if (sub.includes('loa karaoke')) return 1.29;
            if (cat.includes('22 - laptop')) return 1.20;
            if (cat.includes('244 - tablet')) return 1.20;

            return 1;
        }

        const formatMoney = (amount) => new Intl.NumberFormat('vi-VN').format(Math.round(amount));

        let globalParsedData = {}; 
        let currentStoreName = "KHÔNG XÁC ĐỊNH"; 
        
        // Các biến lưu tổng doanh thu toàn bộ siêu thị (tổng của toàn file Excel hợp lệ)
        let globalStoreTotalThuc = 0;
        let globalStoreTotalTraGop = 0;
        let globalStoreTotalQuyDoi = 0;

        function showMessage(msg) {
            document.getElementById('messageBoxContent').textContent = msg;
            document.getElementById('messageBox').classList.remove('hidden');
        }

        function closeMessageBox() {
            document.getElementById('messageBox').classList.add('hidden');
        }

        // Hàm kiểm tra xem ngày xuất hàng có phải là ngày hôm nay không
        function isToday(dateVal) {
            if (!dateVal) return false;
            let str = dateVal.toString().trim();
            
            const today = new Date();
            const tDay = today.getDate();
            const tMonth = today.getMonth() + 1;
            const tYear = today.getFullYear();

            let datePart = str.split(' ')[0].split('T')[0];

            if (datePart.includes('/')) {
                let parts = datePart.split('/');
                if (parts.length === 3) {
                    let p1 = parseInt(parts[0], 10);
                    let p2 = parseInt(parts[1], 10);
                    let p3 = parseInt(parts[2], 10);
                    
                    if (p3 > 1000) { 
                        if (p3 !== tYear) return false;
                        // Kiểm tra cả 2 trường hợp: DD/MM và MM/DD (Tránh lỗi 01/07 hiểu nhầm thành mùng 7 tháng 1)
                        if ((p1 === tDay && p2 === tMonth) || (p2 === tDay && p1 === tMonth)) return true;
                        return false;
                    } else if (p1 > 1000) {
                        if (p1 !== tYear) return false;
                        if ((p2 === tDay && p3 === tMonth) || (p3 === tDay && p2 === tMonth)) return true;
                        return false;
                    }
                }
            } else if (datePart.includes('-')) {
                let parts = datePart.split('-');
                if (parts.length === 3) {
                    let p1 = parseInt(parts[0], 10);
                    let p2 = parseInt(parts[1], 10);
                    let p3 = parseInt(parts[2], 10);
                    
                    if (p1 > 1000) {
                        if (p1 !== tYear) return false;
                        if ((p2 === tMonth && p3 === tDay) || (p3 === tMonth && p2 === tDay)) return true;
                        return false;
                    } else if (p3 > 1000) {
                        if (p3 !== tYear) return false;
                        if ((p1 === tDay && p2 === tMonth) || (p2 === tDay && p1 === tMonth)) return true;
                        return false;
                    }
                }
            }
            
            // Trường hợp fallback cuối cùng
            let fallbackDate = new Date(str);
            if (!isNaN(fallbackDate.getTime())) {
                return fallbackDate.getDate() === tDay && 
                       (fallbackDate.getMonth() + 1) === tMonth && 
                       fallbackDate.getFullYear() === tYear;
            }

            return false;
        }

        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileNameDisplay').textContent = `Đã chọn: ${file.name}`;
            document.getElementById('fileNameDisplay').classList.remove('hidden');
            document.getElementById('loading').style.display = 'block';
            document.getElementById('controlsSection').classList.add('hidden');
            document.getElementById('actionButtons').classList.add('hidden');
            document.getElementById('reportSection').classList.add('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: "", raw: false});
                    
                    processExcelData(jsonData);
                } catch (error) {
                    showMessage("Lỗi khi đọc file. Vui lòng đảm bảo file đúng định dạng.");
                    console.error(error);
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function processExcelData(data) {
            if (data.length < 2) {
                showMessage("File không có dữ liệu!"); return;
            }

            const headers = data[0].map(h => h ? h.toString().trim() : '');
            const idxMaDH = headers.indexOf('Mã đơn hàng');
            const idxMaSieuThiXuat = headers.indexOf('Mã siêu thị xuất hàng');
            const idxSieuThiXuat = headers.indexOf('Siêu thị xuất');
            const idxHinhThucXuat = headers.indexOf('Hình thức xuất');
            const idxNguoiTao = headers.indexOf('Người tạo');
            const idxNganhHang = headers.indexOf('Ngành hàng');
            const idxNhomHang = headers.indexOf('Nhóm hàng');
            const idxGiaBan1 = headers.indexOf('Giá bán_1');
            const idxTrangThaiXuat = headers.indexOf('Trạng thái xuất'); 
            const idxNgayXuatHang = headers.indexOf('Ngày xuất hàng');
            const idxTinhTrangTra = headers.indexOf('Tình trạng nhập trả của sản phẩm đổi với sản phẩm chính'); 

            if(idxHinhThucXuat === -1 || idxNguoiTao === -1 || idxNganhHang === -1 || idxGiaBan1 === -1 || idxMaDH === -1 || idxTrangThaiXuat === -1 || idxNgayXuatHang === -1) {
                showMessage("File không đúng cấu trúc mẫu. Thiếu cột quan trọng (bao gồm cả cột Ngày xuất hàng).");
                return;
            }

            let storeName = "";
            let targetStoreCode = "";
            globalParsedData = {};

            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length === 0) continue;
                
                const trangThaiXuat = row[idxTrangThaiXuat]?.toString().trim();
                if (trangThaiXuat !== 'Đã xuất') continue;

                const ngayXuat = row[idxNgayXuatHang]?.toString().trim();
                if (!isToday(ngayXuat)) continue;

                if (idxTinhTrangTra !== -1) {
                    const tinhTrangTra = row[idxTinhTrangTra]?.toString().trim();
                    if (tinhTrangTra === 'Đã trả') continue;
                }

                const hinhThucXuat = row[idxHinhThucXuat]?.toString().trim();
                
                if (validExportTypes.includes(hinhThucXuat)) {
                    const maDH = row[idxMaDH]?.toString().trim() || "";
                    if (maDH.length >= 5) {
                        targetStoreCode = maDH.substring(0, 5); 
                        break; 
                    }
                }
            }

            if (targetStoreCode && idxMaSieuThiXuat !== -1 && idxSieuThiXuat !== -1) {
                const targetNumber = parseInt(targetStoreCode, 10);

                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (!row || row.length === 0) continue;
                    
                    const maSieuThi = row[idxMaSieuThiXuat]?.toString().trim();
                    const maSieuThiNumber = parseInt(maSieuThi, 10);
                    
                    if (maSieuThi === targetStoreCode || (!isNaN(targetNumber) && maSieuThiNumber === targetNumber)) {
                        const tenST = row[idxSieuThiXuat]?.toString().trim();
                        if (tenST) {
                            storeName = tenST;
                            break; 
                        }
                    }
                }
            }

            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length === 0) continue;

                const trangThaiXuat = row[idxTrangThaiXuat]?.toString().trim();
                if (trangThaiXuat !== 'Đã xuất') continue;

                const ngayXuat = row[idxNgayXuatHang]?.toString().trim();
                if (!isToday(ngayXuat)) continue;

                if (idxTinhTrangTra !== -1) {
                    const tinhTrangTra = row[idxTinhTrangTra]?.toString().trim();
                    if (tinhTrangTra === 'Đã trả') continue;
                }

                const hinhThucXuat = row[idxHinhThucXuat]?.toString().trim();
                if (!validExportTypes.includes(hinhThucXuat)) continue;

                // Chỉ tính đơn do CHÍNH siêu thị này tạo (5 ký tự đầu Mã đơn hàng = mã kho).
                // Tránh cộng nhầm đơn của kho khác nếu file export gộp nhiều siêu thị.
                if (targetStoreCode) {
                    const maDHRow = row[idxMaDH]?.toString().trim() || "";
                    if (maDHRow.substring(0, 5) !== targetStoreCode) continue;
                }

                const nguoiTao = row[idxNguoiTao]?.toString().trim() || 'Không xác định';
                const nganhHang = row[idxNganhHang]?.toString().trim() || 'Khác';
                const nhomHang = idxNhomHang !== -1 ? (row[idxNhomHang]?.toString().trim() || '') : '';
                const giaBan = parseFloat(row[idxGiaBan1]) || 0;

                if (!globalParsedData[nguoiTao]) {
                    globalParsedData[nguoiTao] = {};
                }
                if (!globalParsedData[nguoiTao][nganhHang]) {
                    globalParsedData[nguoiTao][nganhHang] = {
                        doanhThuThuc: 0,
                        doanhThuTraGop: 0,
                        doanhThuQuyDoi: 0
                    };
                }

                globalParsedData[nguoiTao][nganhHang].doanhThuThuc += giaBan;
                const heSoNganhHang = getMultiplier(nganhHang, nhomHang);
                
                if (installmentTypes.includes(hinhThucXuat)) {
                    globalParsedData[nguoiTao][nganhHang].doanhThuTraGop += giaBan;
                    globalParsedData[nguoiTao][nganhHang].doanhThuQuyDoi += giaBan * heSoNganhHang * 1.30;
                } else {
                    globalParsedData[nguoiTao][nganhHang].doanhThuQuyDoi += giaBan * heSoNganhHang;
                }
            }

            if(Object.keys(globalParsedData).length === 0) {
                showMessage("Không có đơn hàng nào hợp lệ được xuất trong hôm nay!");
                return;

                                    <th class="px-4 py-4 text-left font-bold text-gray-700 text-sm uppercase">Ngành Hàng Tập Thể</th>
                                    <th class="px-4 py-4 text-right font-bold text-gray-700 text-sm uppercase">DT Thực</th>
                                    <th class="px-4 py-4 text-right font-bold text-gray-700 text-sm uppercase">DT Trả Góp</th>
                                    <th class="px-4 py-4 text-right font-bold text-gray-700 text-sm uppercase">DT Quy Đổi</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHTML}
                            </tbody>
                            <tfoot class="bg-gray-100 border-t-2 border-gray-300">
                                <tr>
                                    <td colspan="2" class="px-4 py-4 text-center font-bold text-gray-800 uppercase text-sm">TỔNG CỘNG TOÀN SIÊU THỊ</td>
                                    <td class="px-4 py-4 text-right font-bold text-blue-700 text-base">${formatMoney(grandTotalThuc)}</td>
                                    <td class="px-4 py-4 text-right font-bold text-orange-600 text-base">${formatMoney(grandTotalTraGop)}</td>
                                    <td class="px-4 py-4 text-right font-bold text-emerald-700 text-base">${formatMoney(grandTotalQuyDoi)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            `;

            captureArea.innerHTML = tableHTML;
            captureArea.className = "rounded-xl relative p-0"; 

            setTimeout(() => {
                html2canvas(captureArea, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: "#ffffff" 
                }).then(canvas => {
                    document.getElementById('loading').style.display = 'none';
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    document.getElementById('previewImage').src = imgData;
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = imgData;
                        const safeStoreName = currentStoreName.replace(/[^a-zA-Z0-9]/g, '_');
                        const timestamp = new Date().getTime();
                        a.download = `Bang_Ke_Nganh_Hang_ST_${safeStoreName}_${timestamp}.jpg`;
                        a.click();
                    };

                    document.getElementById('previewModal').classList.remove('hidden');
                    renderReport();
                }).catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    showMessage("Có lỗi xảy ra khi tạo ảnh: " + err);
                    renderReport(); 
                });
            }, 150);
        }

        // Chụp ảnh thẻ chi tiết (Cũ)
        function generatePreview() {
            const captureArea = document.getElementById('captureArea');
            document.getElementById('loading').style.display = 'block';

            setTimeout(() => {
                html2canvas(captureArea, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: "#ffffff" 
                }).then(canvas => {
                    document.getElementById('loading').style.display = 'none';
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    document.getElementById('previewImage').src = imgData;
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = imgData;
                        
                        const safeStoreName = currentStoreName.replace(/[^a-zA-Z0-9]/g, '_');
                        const timestamp = new Date().getTime();
                        a.download = `Bao_Cao_The_Chi_Tiet_${safeStoreName}_${timestamp}.jpg`;
                        a.click();
                    };

                    document.getElementById('previewModal').classList.remove('hidden');
                }).catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    showMessage("Có lỗi xảy ra khi tạo ảnh: " + err);
                });
            }, 100);
        }

        function closePreviewModal() {
            document.getElementById('previewModal').classList.add('hidden');
        }
    </script>
</body>
</html>
